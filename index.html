<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FixHaiti | Infrastructure Intelligence</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'FixHaiti','short_name':'FixHaiti','start_url':'.','display':'standalone','background_color':'#0A0A0A','theme_color':'#007AFF','icons':[{'src':'https://via.placeholder.com/192/007AFF/ffffff?text=FH','sizes':'192x192','type':'image/png'}]}">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --b: #000; --w: #fff; --blue: #007AFF; --red: #FF3B30; --gray: #1C1C1E; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--b); color: var(--w); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; z-index: 1001; }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--blue); }
        .badge { background: #333; padding: 4px 8px; border-radius: 4px; font-size: 10px; color: #aaa; }

        #map { flex-grow: 1; z-index: 1; }

        /* Floating UI */
        .stats-overlay { position: absolute; top: 80px; left: 20px; z-index: 1000; pointer-events: none; }
        .stat-card { background: rgba(28,28,30,0.9); padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--blue); min-width: 120px; }
        .stat-card small { color: #888; font-size: 10px; text-transform: uppercase; }
        .stat-card div { font-size: 18px; font-weight: bold; }

        .btn-report { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; background: var(--blue); color: white; border: none; padding: 16px 32px; border-radius: 50px; font-weight: bold; font-size: 16px; box-shadow: 0 10px 30px rgba(0,122,255,0.4); cursor: pointer; transition: 0.2s; }
        .btn-report:active { transform: translateX(-50%) scale(0.95); }

        /* Fullscreen Modal */
        .modal { display: none; position: fixed; inset: 0; background: var(--b); z-index: 2000; padding: 25px; flex-direction: column; overflow-y: auto; }
        .modal h2 { margin-top: 0; color: var(--blue); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #888; text-transform: uppercase; }
        select, input, textarea { width: 100%; background: var(--gray); border: 1px solid #333; color: white; padding: 14px; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        .estimate-panel { background: #0A0A0A; padding: 20px; border-radius: 12px; border: 1px solid var(--blue); margin-top: 10px; }
        .cost-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .total-price { font-size: 22px; font-weight: bold; color: var(--blue); margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }

        .btn-submit { background: var(--blue); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 20px; }
        .btn-close { background: transparent; color: #555; border: none; width: 100%; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">FIXHAITI</div>
    <div class="badge">BETA v1.02</div>
</header>

<div class="stats-overlay">
    <div class="stat-card">
        <small>Signalements</small>
        <div id="count-total">0</div>
    </div>
    <div class="stat-card" style="border-color: var(--red);">
        <small>Urgent (24h)</small>
        <div id="count-urgent">0</div>
    </div>
</div>

<div id="map"></div>

<button class="btn-report" onclick="openModal()">SIGNALER PROBLÈME</button>

<div id="modal" class="modal">
    <h2>Nouveau Rapport</h2>
    
    <div class="form-group">
        <label>Type d'infrastructure</label>
        <select id="issue-type" onchange="updateEstimate()">
            <option value="55" data-label="Nid-de-poule">Route (Nid-de-poule)</option>
            <option value="120" data-label="Drainage">Caniveau Bouché</option>
            <option value="350" data-label="Électricité">Poteau EDH Endommagé</option>
            <option value="800" data-label="Pont">Structure Pont</option>
        </select>
    </div>

    <div class="form-group">
        <label>Importance du trafic</label>
        <input type="range" id="traffic" min="1" max="10" value="5" oninput="updateEstimate()">
        <div style="display: flex; justify-content: space-between; font-size: 10px; color: #555;">
            <span>FAIBLE</span><span>CRITIQUE</span>
        </div>
    </div>

    <div class="estimate-panel">
        <div class="cost-row"><span>Matériaux:</span><span id="est-mat">$0</span></div>
        <div class="cost-row"><span>Main d'œuvre:</span><span id="est-lab">$0</span></div>
        <div class="total-price" id="est-total">$0 USD</div>
    </div>

    <button class="btn-submit" onclick="submitData()">TRANSMETTRE AU RÉSEAU</button>
    <button class="btn-close" onclick="closeModal()">RETOUR À LA CARTE</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Storage Logic
    let db = JSON.parse(localStorage.getItem('fixhaiti_data')) || [];
    
    // 2. Initialize Map
    const map = L.map('map', { zoomControl: false }).setView([18.5392, -72.3350], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    function updateStats() {
        document.getElementById('count-total').innerText = db.length;
        document.getElementById('count-urgent').innerText = db.filter(i => i.traffic > 7).length;
    }

    function renderPins() {
        db.forEach(item => {
            L.circleMarker([item.lat, item.lng], {
                radius: 10,
                fillColor: item.traffic > 7 ? '#FF3B30' : '#007AFF',
                color: '#fff', weight: 2, fillOpacity: 0.9
            }).addTo(map).bindPopup(`<b>${item.type}</b><br>Est: ${item.cost}`);
        });
    }

    // 3. UI Logic
    function openModal() { document.getElementById('modal').style.display = 'flex'; updateEstimate(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function updateEstimate() {
        const base = parseInt(document.getElementById('issue-type').value);
        const traffic = parseInt(document.getElementById('traffic').value);
        
        const mat = base * (traffic * 2.5);
        const lab = mat * 0.4;
        const total = mat + lab;

        document.getElementById('est-mat').innerText = `$${mat.toLocaleString()}`;
        document.getElementById('est-lab').innerText = `$${lab.toLocaleString()}`;
        document.getElementById('est-total').innerText = `$${total.toLocaleString()} USD`;
    }

    function submitData() {
        navigator.geolocation.getCurrentPosition((pos) => {
            const newReport = {
                id: Date.now(),
                type: document.getElementById('issue-type').selectedOptions[0].getAttribute('data-label'),
                traffic: document.getElementById('traffic').value,
                cost: document.getElementById('est-total').innerText,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            };
            
            db.push(newReport);
            localStorage.setItem('fixhaiti_data', JSON.stringify(db));
            
            alert("Rapport envoyé. Votre position a été enregistrée.");
            location.reload(); // Refresh to show new pin
        }, () => {
            alert("Veuillez activer le GPS pour signaler un problème.");
        });
    }

    // Run on Load
    updateStats();
    renderPins();
</script>

</body>
</html>
