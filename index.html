<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FixHaiti — National Infrastructure Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* --- CORE STYLES (PRESERVED) --- */
        * {margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', Arial, sans-serif;}
        body {background:#0a0f1a; color:white; overflow-x:hidden;}

        nav {
            position:fixed; top:0; width:100%;
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 60px; background:rgba(0,0,0,0.8);
            backdrop-filter:blur(10px); z-index:1000; border-bottom: 1px solid #1e293b;
        }

        .logo {font-size:24px; font-weight:900; color:#00d9ff; letter-spacing:2px; text-transform: uppercase;}
        nav a {color:white; margin-left:25px; text-decoration:none; font-size:12px; opacity:0.6; text-transform: uppercase; font-weight: 700;}

        /* --- THE REPORTING POPUP (RESTORED SIZE) --- */
        .popup-form { background: #0f1626; padding: 25px; border-radius: 8px; width: 320px; color: white; border: 1px solid #00d9ff33; }
        .popup-form select, .popup-form textarea, .popup-form input { width: 100%; margin: 10px 0; padding: 14px; border-radius: 4px; background: #0a0f1a; color: white; border: 1px solid #1e293b; font-size: 12px; }
        .image-preview { width: 100%; height: 120px; background: #000; margin-top: 10px; border: 1px dashed #334155; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #64748b; background-size: cover; background-position: center;}

        /* --- THE AUDIT TABLET (ADMIN INTERFACE + MACHINERY CHECKLIST) --- */
        #auditOverlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(5,7,10,0.96); z-index:20000; align-items:center; justify-content:center;
            backdrop-filter: blur(15px);
        }
        .audit-sheet {
            background:#0f1626; width:90%; max-width:850px; padding:40px; 
            border: 1px solid #3b82f6; border-radius:12px; max-height: 90vh; overflow-y: auto;
        }
        .audit-grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top: 20px;}
        .audit-field label { display:block; font-size:10px; color:#64748b; text-transform:uppercase; margin-bottom:8px; font-weight: 800;}
        .audit-field input, .audit-field select, .audit-field textarea {
            width:100%; background:#0a0f1a; border:1px solid #1e293b; padding:12px; color:white; border-radius:4px; font-size:13px;
        }

        /* Machinery Checklist Styling */
        .machinery-box {
            margin-top: 25px; border-top: 1px solid #1e293b; padding-top: 20px;
        }
        .machinery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 10px;
        }
        .check-item {
            display: flex; align-items: center; font-size: 11px; color: #94a3b8; cursor: pointer;
        }
        .check-item input { margin-right: 10px; accent-color: #00ff88; }

        /* --- DASHBOARD & LAYOUT --- */
        .hero { height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; position:relative; overflow:hidden;}
        #roadNetwork { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; opacity: 0.4;}
        .hero-content {position:relative; z-index:2; max-width:800px;}
        .hero h1 {font-size:55px; margin-bottom:20px; letter-spacing:-1px;}
        .btn { padding:14px 28px; border:none; background:#00d9ff; color:black; border-radius:4px; cursor:pointer; font-weight:800; text-transform: uppercase; font-size: 11px; transition: 0.2s ease;}
        .stats { display:flex; justify-content:space-around; padding:80px 40px; background:#0f1626; border-bottom: 1px solid #1e293b;}
        .card h2 {font-size:42px; color:#00d9ff;}
        .card p {font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5;}
        #mapBox { width:100%; max-width: 1200px; height:550px; margin:auto; border:1px solid #1e293b; border-radius:8px; z-index:1;}
        .issue-panel { width:100%; max-width:1200px; margin:40px auto; padding:40px; background:#0f1626; border:1px solid #1e293b; border-radius:8px; text-align:left;}
        .issue-panel p {margin:14px 0; font-size:14px; color: #94a3b8; border-bottom: 1px solid #1e293b; padding-bottom: 10px;}
        .issue-panel span {color: white; font-weight: 600; float: right;}
        .dashboard { padding:100px 10%; background:#0f1626; border-top: 1px solid #1e293b;}
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:25px; }
        .box { background:#0a0f1a; padding:30px; border-radius:12px; border:1px solid #1e293b; }
        #expertBar { display: none; position: fixed; top: 65px; left: 0; width: 100%; height: 35px; background: #00ff88; color: #000; align-items: center; padding: 0 60px; z-index: 999; font-size: 10px; font-weight: 900; }
        #loginOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,7,10,0.98); z-index:10000; align-items:center; justify-content:center; }
        #guardianActions { display: none; margin-top: 30px; border-top: 1px dashed #1e293b; padding-top: 25px;}
    </style>
</head>
<body>

<div id="loginOverlay">
    <div style="background:#0f1626; padding:50px; border:1px solid #1e293b; border-radius:8px; width:380px; text-align:center;">
        <h2 style="font-size:10px; letter-spacing:5px; margin-bottom:30px; color:#00d9ff; text-transform: uppercase;">Technical Access</h2>
        <input type="text" id="adminName" placeholder="ENTER NAME" style="width:100%; padding:15px; margin-bottom:10px; background:#0a0f1a; color:white; border:1px solid #1e293b; text-align:center; text-transform: uppercase;">
        <input type="password" id="gCode" placeholder="SECTOR KEY" style="width:100%; padding:15px; margin-bottom:20px; background:#0a0f1a; color:white; border:1px solid #1e293b; text-align:center;">
        <button class="btn" style="width:100%;" onclick="validateGuardian()">Authorize Session</button>
    </div>
</div>

<div id="auditOverlay">
    <div class="audit-sheet">
        <h2 style="font-size:11px; color:#00d9ff; letter-spacing:3px; text-transform:uppercase; border-bottom:1px solid #1e293b; padding-bottom:15px;">Institutional Verification Matrix</h2>
        <div class="audit-grid">
            <div class="audit-field"><label>Street Address</label><input type="text" id="auditAddress"></div>
            <div class="audit-field">
                <label>Traffic Density</label>
                <select id="auditTraffic">
                    <option>Low (Residential)</option><option>Moderate (Commercial)</option>
                    <option>High (Main Arterial)</option><option>Critical (Transit Corridor)</option>
                </select>
            </div>
            <div class="audit-field"><label>Duration</label><input type="text" id="auditDuration" placeholder="Days"></div>
            <div class="audit-field"><label>Valuation (USD)</label><input type="text" id="auditCost"></div>
        </div>

        <div class="machinery-box">
            <label style="font-size:10px; color:#64748b; text-transform:uppercase; font-weight:800;">MTPTC Required Heavy Machinery</label>
            <div class="machinery-grid" id="machineChecks">
                <label class="check-item"><input type="checkbox" value="Excavator (Poclain)"> Excavator (Poclain)</label>
                <label class="check-item"><input type="checkbox" value="Bulldozer (D7/D8)"> Bulldozer (D7/D8)</label>
                <label class="check-item"><input type="checkbox" value="Motor Grader"> Motor Grader</label>
                <label class="check-item"><input type="checkbox" value="Vibratory Roller"> Vibratory Roller</label>
                <label class="check-item"><input type="checkbox" value="Backhoe Loader"> Backhoe Loader</label>
                <label class="check-item"><input type="checkbox" value="Dump Truck (12yd)"> Dump Truck (12yd)</label>
                <label class="check-item"><input type="checkbox" value="Asphalt Paver"> Asphalt Paver</label>
                <label class="check-item"><input type="checkbox" value="Pneumatic Roller"> Pneumatic Roller</label>
                <label class="check-item"><input type="checkbox" value="Water Truck"> Water Truck</label>
                <label class="check-item"><input type="checkbox" value="Concrete Mixer"> Concrete Mixer</label>
            </div>
        </div>

        <div class="audit-field" style="margin-top:25px;">
            <label>Audit Notes</label>
            <textarea id="auditNotes" rows="3"></textarea>
        </div>
        <div style="display:flex; gap:15px; margin-top:30px;">
            <button class="btn" style="flex:1; background:#00ff88; color:#000;" onclick="submitVerification()">Submit Official Audit</button>
            <button class="btn" style="flex:1; background:transparent; border:1px solid #ef4444; color:#ef4444;" onclick="closeAudit()">Discard</button>
        </div>
    </div>
</div>

<nav>
    <div class="logo">FIXHAITI</div>
    <div><a href="#map">Map</a><a href="#dashboard">Dashboard</a><span onclick="document.getElementById('loginOverlay').style.display='flex'" style="cursor:pointer; opacity:0; margin-left:20px;">.</span></div>
</nav>

<div id="expertBar">ADMIN ACTIVE</div>

<section class="hero">
    <canvas id="roadNetwork"></canvas>
    <div class="hero-content"><h1>Infrastructure Intelligence</h1><p>Turning verified ground-truth into sovereign reconstruction priorities.</p></div>
</section>

<section id="map" style="padding:100px 40px; background:#0a0f1a; text-align:center;">
    <div id="mapBox"></div>
    <button class="btn" onclick="reportAtMyLocation()" style="margin-top:30px; background:transparent; border:1px solid #1e293b; color:#94a3b8;">Create Signal</button>
    <div class="issue-panel">
        <h3 style="color:#00d9ff; font-size:10px; letter-spacing:2px; margin-bottom:25px; text-transform: uppercase;">ASSET DETAILS</h3>
        <p>Issue: <span id="vType">---</span></p>
        <p>Summary: <span id="vDesc">---</span></p>
        <p>Status: <span id="vStatus">---</span></p>
        <div id="photoContainer" style="display:none; margin-top: 25px;"><div id="displayPhoto" style="width:240px; height:140px; background-size:cover;"></div></div>
        <div id="guardianActions">
            <button class="btn" style="background:#00ff88; color:#000; width:48%;" onclick="openAudit()">Verify Report</button>
            <button class="btn" style="background:#fff; color:#000; width:100%; margin-top:15px;" onclick="generateDossier()">Export PDF Dossier</button>
        </div>
    </div>
</section>

<script>
    // --- ANIMATION & MAP CORE ---
    const canvas=document.getElementById("roadNetwork"); const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    let nodes=[]; for(let i=0;i<45;i++){ nodes.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3}); }
    function animate(){ ctx.clearRect(0,0,canvas.width,canvas.height); nodes.forEach(n=>{ n.x+=n.vx; n.y+=n.vy; ctx.beginPath(); ctx.arc(n.x,n.y,1.5,0,Math.PI*2); ctx.fillStyle="#00d9ff"; ctx.fill(); }); requestAnimationFrame(animate); }
    animate();

    const map=L.map('mapBox', {zoomControl: false}).setView([18.539, -72.336], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let currentMarker = null, isAuthorized = false, tempImageData = null;
    let adminUser = { name: "", id: "" };
    let stats = { total: 0, pending: 0, verified: 0, exposure: 0 };

    function validateGuardian() {
        const nameInput = document.getElementById('adminName').value.trim();
        if(document.getElementById('gCode').value === "1974" && nameInput.length > 2) {
            isAuthorized = true; adminUser.name = nameInput.toUpperCase();
            adminUser.id = `${nameInput.charAt(0).toUpperCase()}-AUDIT-${Math.floor(100+Math.random()*899)}`;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('expertBar').style.display = 'flex';
            document.getElementById('guardianActions').style.display = 'block';
        }
    }

    function addIssue(lat, lng, type, desc, status="Pending Audit", photo) {
        let m = L.circleMarker([lat, lng], { radius: 7, color: "#ef4444", fillOpacity: 0.8 }).addTo(map);
        m.options.vData = { type, desc, status, photo, lat: lat.toFixed(5), lng: lng.toFixed(5), machinery: [] };
        m.on("click", () => {
            currentMarker = m; const d = m.options.vData;
            document.getElementById("vType").innerText = d.type;
            document.getElementById("vDesc").innerText = d.desc;
            document.getElementById("vStatus").innerText = d.status;
            if(d.photo) { document.getElementById("photoContainer").style.display="block"; document.getElementById("displayPhoto").style.backgroundImage=`url(${d.photo})`; }
        });
    }

    function reportAtMyLocation(){
        navigator.geolocation.getCurrentPosition(pos=>{
            let lat=pos.coords.latitude, lng=pos.coords.longitude;
            let popup=`<div class="popup-form">
                <h2 style="font-size:10px; color:#00d9ff; margin-bottom:10px;">NEW GROUND SIGNAL</h2>
                <select id="t">
                    <option>Pothole / Nid-de-poule (Major)</option>
                    <option>Open Sewer / Égout Ouvert</option>
                    <option>Drainage Clogged (Flooding Risk)</option>
                    <option>Asphalt Erosion (Severe)</option>
                    <option>Landslide / Éboulement Risk</option>
                    <option>Bridge Joint Degradation</option>
                </select>
                <textarea id="d" placeholder="Specify location/hazard details..." rows="3"></textarea>
                <input type="file" accept="image/*" onchange="handleImage(this)">
                <div id="pPreview" class="image-preview">Attachment Slot</div>
                <button class="btn" style="width:100%; margin-top:10px;" onclick="addIssue(${lat},${lng},document.getElementById('t').value,document.getElementById('d').value,'Pending Audit',tempImageData); map.closePopup();">Broadcast</button>
            </div>`;
            L.popup().setLatLng([lat,lng]).setContent(popup).openOn(map);
        });
    }

    function handleImage(input) {
        const reader = new FileReader(); reader.onload = (e) => {
            tempImageData = e.target.result;
            document.getElementById('pPreview').style.backgroundImage = `url(${tempImageData})`;
            document.getElementById('pPreview').innerText = "";
        };
        reader.readAsDataURL(input.files[0]);
    }

    function openAudit() { if(isAuthorized) document.getElementById('auditOverlay').style.display='flex'; }
    function closeAudit() { document.getElementById('auditOverlay').style.display='none'; }

    function submitVerification() {
        const d = currentMarker.options.vData;
        d.address = document.getElementById('auditAddress').value;
        d.traffic = document.getElementById('auditTraffic').value;
        d.duration = document.getElementById('auditDuration').value;
        d.cost = document.getElementById('auditCost').value;
        d.auditNotes = document.getElementById('auditNotes').value;
        
        // Save checked machinery
        d.machinery = [];
        document.querySelectorAll('#machineChecks input:checked').forEach(cb => d.machinery.push(cb.value));
        
        d.status = "VERIFIED";
        currentMarker.setStyle({color: "#3b82f6"});
        document.getElementById("vStatus").innerText = "VERIFIED";
        closeAudit();
    }

    function generateDossier() {
        const d = currentMarker.options.vData;
        if(d.status !== "VERIFIED") return alert("Audit required.");
        const { jsPDF } = window.jspdf; const doc = new jsPDF();

        // Header
        doc.setFillColor(10, 15, 26); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(0, 217, 255); doc.setFontSize(26); doc.text("FIXHAITI", 20, 28);
        doc.setTextColor(255); doc.setFontSize(9); doc.text("INSTITUTIONAL INFRASTRUCTURE DOSSIER", 21, 35);

        // Asset Data
        doc.setTextColor(0); doc.setFont("helvetica", "bold"); doc.text("01. GEOSPATIAL DATA", 20, 55); doc.line(20, 57, 190, 57);
        doc.setFont("helvetica", "normal"); doc.text(`LAT/LNG: ${d.lat} / ${d.lng}`, 25, 65);
        doc.text(`STREET: ${d.address.toUpperCase()}`, 25, 72);

        // Valuation
        doc.setFont("helvetica", "bold"); doc.text("02. ENGINEERING VALUATION", 20, 90); doc.line(20, 92, 190, 92);
        doc.setFont("helvetica", "normal"); doc.text(`ASSET TYPE: ${d.type}`, 25, 102);
        doc.text(`ESTIMATED COST: ${d.cost}`, 25, 110);
        doc.text(`ESTIMATED DURATION: ${d.duration}`, 25, 118);

        // NEW: MACHINERY SECTION
        doc.setFont("helvetica", "bold"); doc.text("03. MTPTC LOGISTICS & HEAVY EQUIPMENT", 20, 135); doc.line(20, 137, 190, 137);
        doc.setFont("helvetica", "normal"); 
        let equipList = d.machinery.length > 0 ? d.machinery.join(", ") : "None Specified";
        doc.text(doc.splitTextToSize(`REQUIRED EQUIPMENT: ${equipList}`, 165), 25, 147);

        // Notes & Photo
        doc.setFont("helvetica", "bold"); doc.text("04. FIELD INTELLIGENCE", 20, 170); doc.line(20, 172, 190, 172);
        doc.setFont("helvetica", "normal"); doc.text(doc.splitTextToSize(`AUDITOR NOTES: ${d.auditNotes}`, 165), 25, 180);
        if(d.photo) doc.addImage(d.photo, 'JPEG', 20, 200, 80, 45);

        // Authority
        doc.setFont("helvetica", "bold"); doc.text("05. AUTHORIZATION", 20, 260); doc.line(20, 262, 190, 262);
        doc.setFont("helvetica", "normal"); doc.text(`AGENT ID: ${adminUser.id}`, 25, 270);

        doc.save(`Audit_${adminUser.id}.pdf`);
    }
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
