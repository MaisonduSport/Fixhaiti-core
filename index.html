<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FixHaiti — Infrastructure Intelligence Platform </title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif;}
body {background:#0a0f1a; color:white; overflow-x:hidden;}

nav {
position:fixed; top:0; width:100%;
display:flex; justify-content:space-between; align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo {font-size:26px; font-weight:bold; color:#00d9ff;}

nav a {color:white; margin-left:25px; text-decoration:none; font-size:14px;}

.hero {
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}

.hero-content {position:relative; z-index:2;}

#roadNetwork {
position:absolute;
width:100%;
height:100%;
}

.btn {
padding:12px 25px;
background:#00d9ff;
border:none;
cursor:pointer;
font-weight:bold;
}

.stats {
display:flex;
justify-content:space-around;
padding:80px 40px;
background:#0f1626;
}

.map-section {padding:50px;}

#mapBox {
width:100%;
height:500px;
border-radius:10px;
}

/* ISSUE PANEL */
.issue-panel {
margin-top:20px;
padding:20px;
border:1px solid #00d9ff33;
}

/* NEW FEED */
.feed {
padding:80px 10%;
background:#0a0f1a;
}

.feed-item {
padding:15px;
border-bottom:1px solid #1e293b;
}

/* PRIORITY */
.priority {
padding:80px 10%;
background:#0f1626;
}

.priority-item {
padding:15px;
border:1px solid #1e293b;
margin-bottom:10px;
}

footer {
padding:40px;
text-align:center;
}

</style>
</head>

<body>

<nav>
<div class="logo">FIXHAITI</div>
<div>
<a href="#">Home</a>
<a href="#map">Map</a>
<a href="#feed">Live Feed</a>
<a href="#priority">Priority</a>
</div>
</nav>

<section class="hero">
<canvas id="roadNetwork"></canvas>
<div class="hero-content">
<h1>Infrastructure Intelligence Platform</h1>
<button class="btn" onclick="document.getElementById('map').scrollIntoView()">Explore</button>
</div>
</section>

<section class="stats">
<div><h2 id="r1">0</h2><p>Reports</p></div>
<div><h2 id="r2">0</h2><p>Active</p></div>
</section>

<section id="map" class="map-section">
<h2>Map</h2>
<div id="mapBox"></div>
<button class="btn" onclick="reportAtMyLocation()">Report</button>

<div class="issue-panel">
<p><b>Type:</b> <span id="type">-</span></p>
<p><b>Description:</b> <span id="desc">-</span></p>
<p><b>Severity:</b> <span id="severity">-</span></p>
</div>
</section>

<!-- ✅ LIVE FEED -->
<section id="feed" class="feed">
<h2>Live Issue Feed</h2>
<div id="feedList"></div>
</section>

<!-- ✅ PRIORITY -->
<section id="priority" class="priority">
<h2>Priority Queue</h2>
<div id="priorityList"></div>
<button class="btn" onclick="recalculate()">Recalculate Priority</button>
</section>

<footer>
FIXHAITI
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */
const map = L.map('mapBox').setView([19,-72.3],8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let issues = [];
let total=0;
let active=0;

function updateStats(){
document.getElementById("r1").innerText=total;
document.getElementById("r2").innerText=active;
}

/* ADD ISSUE */
function addIssue(lat,lng,type,desc,severity="Critical"){

total++; active++;
updateStats();

let issue = {lat,lng,type,desc,severity};
issues.push(issue);

let marker = L.marker([lat,lng]).addTo(map);

marker.on("click",()=>{
document.getElementById("type").innerText=type;
document.getElementById("desc").innerText=desc;
document.getElementById("severity").innerText=severity;
});

updateFeed();
updatePriority();
}

/* FEED */
function updateFeed(){
let feed=document.getElementById("feedList");
feed.innerHTML="";

issues.slice().reverse().forEach(i=>{
let div=document.createElement("div");
div.className="feed-item";
div.innerHTML=`${i.type} - ${i.severity}`;
feed.appendChild(div);
});
}

/* PRIORITY */
function updatePriority(){
let list=document.getElementById("priorityList");
list.innerHTML="";

let sorted=[...issues].sort((a,b)=>{
return severityScore(b.severity)-severityScore(a.severity);
});

sorted.forEach(i=>{
let div=document.createElement("div");
div.className="priority-item";
div.innerHTML=`${i.type} (${i.severity})`;
list.appendChild(div);
});
}

function severityScore(s){
if(s==="Critical") return 3;
if(s==="Dangerous") return 2;
return 1;
}

function recalculate(){
updatePriority();
}

/* REPORT */
function reportAtMyLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

let popup = L.popup()
.setLatLng([lat,lng])
.setContent(`
<select id="t">
<option>Pothole</option>
<option>Flooding</option>
<option>Road Damage</option>
</select>
<textarea id="d"></textarea>
<button onclick="submitIssue(${lat},${lng})">Submit</button>
`)
.openOn(map);

});
}

function submitIssue(lat,lng){
let type=document.getElementById("t").value;
let desc=document.getElementById("d").value;
addIssue(lat,lng,type,desc,"Critical");
map.closePopup();
}

/* DEMO */
addIssue(19.7,-72.2,"Road Damage","Example","Critical");
addIssue(18.5,-72.3,"Flooding","Example","Dangerous");

</script>

</body>
</html>
