<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixHaiti | Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #007AFF; --bg: #f5f7fa; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* High-End UI Elements */
        .report-panel {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); z-index: 1000;
            display: none;
        }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="report-panel" class="report-panel">
    <h3 id="location-title">Confirmer l'emplacement</h3>
    <p id="address-confirm">Êtes-vous situé sur cette rue ?</p>
    <select id="issue-type" style="width:100%; padding:10px; margin-bottom:10px;">
        <option>Route / Nid-de-poule</option>
        <option>Déchets / Assainissement</option>
        <option>Eau / Fuite DINEPA</option>
    </select>
    <input type="file" id="media" accept="image/*" style="display:none">
    <button class="btn" onclick="document.getElementById('media').click()">📸 Ajouter une photo (Optionnel)</button>
    <button class="btn" style="background:#34C759" onclick="confirmReport()">Oui, Signaler ici</button>
    <button class="btn" style="background:#ff3b30" onclick="closePanel()">Annuler</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([18.5392, -72.3350], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    let tempMarker;

    // Click map to report
    map.on('click', function(e) {
        if(tempMarker) map.removeLayer(tempMarker);
        tempMarker = L.marker(e.latlng).addTo(map);
        document.getElementById('report-panel').style.display = 'block';
        document.getElementById('address-confirm').innerText = `Coordonnées: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
    });

    function confirmReport() {
        // Logic to save to database would go here
        alert("Rapport enregistré avec succès.");
        closePanel();
    }

    function closePanel() {
        document.getElementById('report-panel').style.display = 'none';
        if(tempMarker) map.removeLayer(tempMarker);
    }
</script>
</body>
</html>
