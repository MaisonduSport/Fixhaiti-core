<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixHaiti | Infrastructure Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #D4AF37; --bg: #0a0a0a; --panel: #1a1a1a; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .dashboard {
            position: absolute; top: 20px; left: 20px; width: 320px;
            background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px;
            padding: 20px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; color: var(--accent); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #222; padding: 10px; border-radius: 4px; text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; display: block; color: var(--accent); }
        .stat-lbl { font-size: 0.6rem; text-transform: uppercase; color: #888; }

        .inspector { background: #222; border-radius: 4px; padding: 15px; margin-bottom: 10px; }
        .inspector-title { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        
        button {
            width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.7rem;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: #333; color: #fff; border: 1px solid #444; }
        .btn-danger { background: #442222; color: #ff6666; }
        
        #photoContainer img { width: 100%; border-radius: 4px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="dashboard">
        <div class="header">
            <div class="logo">FIXHAITI PROTOCOL</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><span id="stat-total" class="stat-val">0</span><span class="stat-lbl">Active Signals</span></div>
            <div class="stat-card"><span id="stat-pending" class="stat-val">0</span><span class="stat-lbl">Pending Audit</span></div>
        </div>

        <div class="inspector">
            <div class="inspector-title">Field Intelligence Inspector</div>
            <div id="vType" style="color: var(--accent); font-weight: bold; margin-bottom: 5px;">---</div>
            <div id="vDesc" style="font-size: 0.85rem; color: #ccc; line-height: 1.4;">Select a coordinate on the map to inspect data.</div>
            <div id="photoContainer" style="display:none;"><img id="vPhoto" src="" /></div>
        </div>

        <button class="btn-primary" onclick="reportAtMyLocation()">Broadcast Signal (GPS)</button>
        <button class="btn-secondary" onclick="generateDossier()">Generate Official Dossier</button>
        <button class="btn-danger" id="btn-dismiss" onclick="dismissReport()" style="display:none;">Dismiss Signal</button>
    </div>

<script>
    const { jsPDF } = window.jspdf;
    let map = L.map('map', { zoomControl: false }).setView([18.5392, -72.3350], 13);
    let currentMarker = null;
    let isAuthorized = true; // Operator status
    let stats = { total: 0, pending: 0, verified: 0 };

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function updateDashboard() {
        document.getElementById('stat-total').innerText = stats.total;
        document.getElementById('stat-pending').innerText = stats.pending;
    }

    function addIssue(lat, lng, type, desc, status = "Pending Audit", photo = null) {
        let marker = L.circleMarker([lat, lng], {
            radius: 8,
            fillColor: status === "VERIFIED" ? "#D4AF37" : "#ff4444",
            color: "#fff",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.8,
            vData: { type, desc, status, photo, lat, lng, agentID: "FH-" + Math.floor(Math.random()*9000) }
        }).addTo(map);

        marker.on('click', function(e) {
            currentMarker = e.target;
            const d = e.target.options.vData;
            document.getElementById("vType").innerText = d.type.toUpperCase();
            document.getElementById("vDesc").innerText = d.desc;
            document.getElementById("btn-dismiss").style.display = "block";
            
            if(d.photo) {
                document.getElementById("vPhoto").src = d.photo;
                document.getElementById("photoContainer").style.display = "block";
            } else {
                document.getElementById("photoContainer").style.display = "none";
            }
        });

        stats.total++;
        if(status === "Pending Audit") stats.pending++;
        updateDashboard();
    }

    // --- DOSSIER GENERATION ---
    function generateDossier() {
        if(!currentMarker) return alert("Select a signal to generate dossier.");
        const d = currentMarker.options.vData;
        const doc = new jsPDF();
        
        doc.setFillColor(26, 26, 26); doc.rect(0, 0, 210, 40, 'F');
        doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(212, 175, 55);
        doc.text("FIXHAITI | INTELLIGENCE DOSSIER", 20, 25);
        
        doc.setFontSize(10); doc.setTextColor(100);
        doc.text(`REFERENCE ID: ${d.agentID}`, 20, 50);
        doc.text(`COORDINATES: ${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}`, 20, 56);
        
        doc.setFontSize(12); doc.setTextColor(0);
        doc.text("01. CLASSIFICATION", 20, 75); doc.line(20, 77, 190, 77);
        doc.text(`TYPE: ${d.type.toUpperCase()}`, 25, 87);
        doc.text(`STATUS: ${d.status.toUpperCase()}`, 25, 94);

        doc.text("02. FIELD OBSERVATIONS", 20, 110); doc.line(20, 112, 190, 112);
        const splitDesc = doc.splitTextToSize(d.desc, 160);
        doc.text(splitDesc, 25, 122);

        // Completion/Resolution Logic
        if(d.status === "RESOLVED") {
            doc.setFont("helvetica", "bold"); doc.text("04. RESOLUTION CERTIFICATION", 20, 177); doc.line(20, 179, 190, 179);
            doc.setFont("helvetica", "normal");
            doc.text(`COMPLETION DATE: ${d.resolvedDate || 'N/A'}`, 25, 189);
            doc.text(`EXECUTING CONTRACTOR: ${d.contractor?.toUpperCase() || 'OFFICIAL DEPT'}`, 25, 196);
            
            if(d.photoAfter) {
                doc.addImage(d.photoAfter, 'JPEG', 20, 215, 80, 50);
                doc.setFontSize(7); doc.text("POST-INTERVENTION VISUAL EVIDENCE", 20, 270);
            }
        } else if(d.photo) {
            doc.addImage(d.photo, 'JPEG', 20, 177, 80, 50);
            doc.setFontSize(7); doc.text("INITIAL FIELD INTELLIGENCE VISUAL", 20, 232);
        }

        doc.setFontSize(8); doc.setTextColor(150);
        doc.text(`DOSSIER TOKEN: ${btoa(d.lat + d.agentID).substring(0,12)}`, 20, 285);
        doc.save(`FIXHAITI_DOSSIER_${d.agentID}.pdf`);
    }

    // --- SIGNAL BROADCAST (GPS + Photo) ---
    function reportAtMyLocation() {
        if (!navigator.geolocation) return alert("Protocol Error: Geolocation unavailable.");
        
        const type = prompt("INTELLIGENCE TYPE: (e.g., Road Damage, Drainage, Traffic Light)");
        if (!type) return;
        const desc = prompt("GROUND SUMMARY / OBSERVATIONS:");
        
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const photoData = event.target.result;
                navigator.geolocation.getCurrentPosition(pos => {
                    addIssue(pos.coords.latitude, pos.coords.longitude, type, desc, "Pending Audit", photoData);
                    alert("Signal Broadcasted to National Grid.");
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }

    // --- SIGNAL DISMISSAL ---
    function dismissReport() {
        if(isAuthorized && currentMarker) {
            if(confirm("Confirm Protocol: Permanently dismiss this signal from the National Grid?")) {
                map.removeLayer(currentMarker);
                if(currentMarker.options.vData.status === "Pending Audit") stats.pending--;
                
                stats.total--;
                updateDashboard();
                document.getElementById("vType").innerText = "---";
                document.getElementById("vDesc").innerText = "Signal Terminated.";
                document.getElementById("photoContainer").style.display = "none";
                document.getElementById("btn-dismiss").style.display = "none";
                currentMarker = null;
            }
        }
    }

    window.addEventListener('resize', () => { map.invalidateSize(); });
</script>
</body>
</html>
