<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixHaiti | Modernisation Infrastructures</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --black: #0A0A0A; --gray: #1A1A1A; --blue: #007AFF; --red: #FF3B30; --green: #34C759; }
        body { font-family: -apple-system, sans-serif; background-color: var(--black); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: black; padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: var(--blue); }

        #map { flex-grow: 1; width: 100%; z-index: 1; }

        .action-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
        button { background: var(--blue); color: white; border: none; padding: 12px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-report { background: var(--red); }

        /* Report Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: auto; background: var(--gray); padding: 20px; border-radius: 15px; border: 1px solid #444; }
        label { display: block; margin: 15px 0 5px; font-size: 0.9rem; color: #aaa; }
        input, select, textarea { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        
        .estimate-box { margin-top: 20px; padding: 15px; background: #000; border-left: 4px solid var(--blue); }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat { background: #222; padding: 10px; border-radius: 8px; text-align: center; }
        .stat span { display: block; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>FIXHAITI <span style="color:white; font-weight:normal;">| PROTOTYPE</span></h1>
</header>

<div id="map"></div>

<div class="summary-grid" style="position: absolute; top: 70px; right: 20px; z-index: 100; width: 200px;">
    <div class="stat"><span style="color:var(--red);">1,240</span>Signalés</div>
    <div class="stat"><span style="color:var(--green);">12</span>Réparés</div>
</div>

<div class="action-panel">
    <button onclick="toggleModal()">SIGNALER UN PROBLÈME</button>
    <button style="background: #333;" onclick="alert('Exportation PDF pour MTPTC générée...')">EXPORTER RAPPORT</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h2>Nouveau Signalement</h2>
        <label>Catégorie</label>
        <select id="cat" onchange="calculateEstimate()">
            <option value="45">Nid-de-poule (Route)</option>
            <option value="120">Caniveau bouché</option>
            <option value="500">Fuite DINEPA (Grosse)</option>
            <option value="2500">Pont Endommagé</option>
        </select>

        <label>Impact (Nombre de personnes affectées)</label>
        <input type="number" id="impact" value="100" oninput="calculateEstimate()">

        <div class="estimate-box">
            <strong>ESTIMATION AUTOMATIQUE (Bordereau)</strong>
            <p id="est-text">Coût estimé: $4,500 USD</p>
            <small style="color: #888;">Basé sur les prix du marché à Port-au-Prince.</small>
        </div>

        <label>Photo</label>
        <input type="file" accept="image/*">

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-report" style="flex:1" onclick="submitReport()">ENVOYER</button>
            <button style="background:#555" onclick="toggleModal()">ANNULER</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Initialize Map centered on Port-au-Prince
    const map = L.map('map', {zoomControl: false}).setView([18.5392, -72.3350], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // 2. Add Dummy Data (Pins)
    const issues = [
        {pos: [18.541, -72.330], desc: "Nid-de-poule Géant", status: "red"},
        {pos: [18.535, -72.340], desc: "Caniveau Inondé", status: "orange"},
        {pos: [18.545, -72.320], desc: "Réparation Terminée", status: "green"}
    ];

    issues.forEach(i => {
        L.circleMarker(i.pos, {
            radius: 8,
            fillColor: i.status === "red" ? "#FF3B30" : i.status === "green" ? "#34C759" : "#FF9500",
            color: "#fff", weight: 1, fillOpacity: 0.8
        }).addTo(map).bindPopup(i.desc);
    });

    // 3. Logic Functions
    function toggleModal() {
        const m = document.getElementById('modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function calculateEstimate() {
        const unitCost = document.getElementById('cat').value;
        const impact = document.getElementById('impact').value;
        const total = unitCost * (impact / 10);
        document.getElementById('est-text').innerText = "Coût estimé: $" + total.toLocaleString() + " USD";
    }

    function submitReport() {
        alert("Rapport enregistré ! Coordonnées GPS capturées. Ajout à la carte publique...");
        toggleModal();
    }
</script>

</body>
</html>
