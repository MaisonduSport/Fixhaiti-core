<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FixHaiti — Infrastructure Intelligence Demo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0a0f1a;color:white}

/* HEADER */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.7);
z-index:1000;
}
.logo{color:#00d9ff;font-weight:bold;font-size:22px}
nav select{padding:6px;background:#0a0f1a;color:white;border:1px solid #00d9ff33}

/* HERO */
.hero{
height:70vh;display:flex;align-items:center;justify-content:center;
text-align:center;position:relative
}
#roadNetwork{position:absolute;width:100%;height:100%}
.hero h1{z-index:2}

/* LAYOUT */
.main{
display:flex;
padding-top:80px;
height:calc(100vh - 80px);
}

#mapBox{
flex:2;
}

.side{
flex:1;
background:#0f1626;
padding:20px;
overflow:auto;
border-left:1px solid #00d9ff33;
}

button{
margin-top:5px;
padding:10px;
width:100%;
background:#00d9ff;
border:none;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.main{flex-direction:column}
#mapBox{height:300px}
}
</style>
</head>

<body>

<nav>
<div class="logo">FIXHAITI</div>

<div>
Role:
<select id="role">
<option>Citizen</option>
<option>Agent</option>
<option>Admin</option>
</select>
</div>
</nav>

<section class="hero">
<canvas id="roadNetwork"></canvas>
<h1>Infrastructure Intelligence Demo</h1>
</section>

<div class="main">
<div id="mapBox"></div>

<div class="side">
<h2>Issue Details</h2>

<p><b>Type:</b> <span id="type">-</span></p>
<p><b>Status:</b> <span id="status">-</span></p>
<p><b>Priority:</b> <span id="priority">-</span></p>
<p><b>Time:</b> <span id="time">-</span></p>
<p><b>Location:</b> <span id="location">-</span></p>
<p><b>Description:</b> <span id="desc">-</span></p>

<div id="actions"></div>

<button onclick="report()">Report Issue</button>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* HERO ANIMATION */
const canvas=document.getElementById("roadNetwork");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let nodes=[];
for(let i=0;i<40;i++){
nodes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:0.3,vy:0.3});
}
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
nodes.forEach(n=>{
n.x+=n.vx;n.y+=n.vy;
if(n.x<0||n.x>canvas.width)n.vx*=-1;
if(n.y<0||n.y>canvas.height)n.vy*=-1;
ctx.beginPath();ctx.arc(n.x,n.y,2,0,Math.PI*2);
ctx.fillStyle="#00d9ff";ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

/* MAP */
const map=L.map('mapBox').setView([19,-72.3],8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

/* DATA */
let issues=[];

function priorityScore(issue){
let score=0;
if(issue.severity==="Critical")score+=3;
if(issue.age>10)score+=2;
return score>4?"HIGH":score>2?"MEDIUM":"LOW";
}

function addIssue(lat,lng,type,desc,severity,location){
let issue={
id:Date.now(),
lat,lng,type,desc,severity,location,
status:"Submitted",
age:0
};
issues.push(issue);

let marker=L.circleMarker([lat,lng],{radius:8,color:"red"}).addTo(map);

marker.on("click",()=>selectIssue(issue));
}

/* SELECT */
let current=null;

function selectIssue(issue){
current=issue;

document.getElementById("type").innerText=issue.type;
document.getElementById("status").innerText=issue.status;
document.getElementById("priority").innerText=priorityScore(issue);
document.getElementById("time").innerText=issue.age+" min ago";
document.getElementById("location").innerText=issue.location;
document.getElementById("desc").innerText=issue.desc;

renderActions();
}

/* ACTIONS */
function renderActions(){
let role=document.getElementById("role").value;
let div=document.getElementById("actions");
div.innerHTML="";

if(!current)return;

if(role==="Agent" && current.status==="Submitted"){
div.innerHTML+=`<button onclick="verify()">Verify</button>
<button onclick="reject()">Reject</button>`;
}

if(role==="Admin" && current.status==="Verified"){
div.innerHTML+=`<button onclick="assign()">Assign</button>`;
}

if(role==="Admin" && current.status==="Assigned"){
div.innerHTML+=`<button onclick="progress()">Start Work</button>`;
}

if(role==="Admin" && current.status==="In Progress"){
div.innerHTML+=`<button onclick="complete()">Complete</button>`;
}
}

/* STATE CHANGES */
function verify(){current.status="Verified";selectIssue(current);}
function reject(){current.status="Rejected";selectIssue(current);}
function assign(){current.status="Assigned";selectIssue(current);}
function progress(){current.status="In Progress";selectIssue(current);}
function complete(){current.status="Completed";selectIssue(current);}

/* REPORT */
function report(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lng=pos.coords.longitude;
addIssue(lat,lng,"Road Damage","User reported issue","Critical","Detected location");
});
}

/* TIME SIMULATION */
setInterval(()=>{
issues.forEach(i=>i.age++);
if(current)selectIssue(current);
},60000);

/* DEMO */
addIssue(19.7,-72.2,"Road Damage","Potholes cluster","Critical","Cap-Haïtien");
addIssue(18.5,-72.3,"Flooding","Drainage blocked","Critical","Port-au-Prince");

</script>

</body>
</html>
