<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixHaiti Admin | Gateway</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --admin-bg: #f8fafc; --sidebar: #0f172a; --accent: #007AFF; --text: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--admin-bg); color: var(--text); margin: 0; overflow: hidden; }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; inset: 0; background: var(--sidebar);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-card h2 { margin-bottom: 20px; font-weight: 800; color: #0f172a; }
        .login-card input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box;
        }

        /* --- ADMIN INTERFACE (HIDDEN BY DEFAULT) --- */
        #admin-content { display: none; height: 100vh; width: 100vw; }
        
        aside { width: 260px; background: var(--sidebar); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); margin-bottom: 40px; }
        nav div { padding: 12px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; color: #94a3b8; }
        nav div:hover, .active { background: rgba(255,255,255,0.1); color: white; }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; background: var(--admin-bg); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .queue-table { width: 100%; background: white; border-radius: 15px; border-collapse: collapse; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .queue-table th { text-align: left; padding: 15px 20px; background: #f1f5f9; font-size: 0.8rem; text-transform: uppercase; color: #64748b; }
        .queue-table td { padding: 20px; border-bottom: 1px solid #f1f5f9; }

        .btn-verify { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 450px; padding: 30px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div style="color: var(--accent); font-weight: 800; margin-bottom: 10px;">FIXHAITI SYSTEM</div>
        <h2>Accès Expert</h2>
        <input type="password" id="admin-pass" placeholder="Entrez votre code d'accès">
        <button class="btn-verify" style="width: 100%; padding: 15px;" onclick="checkAuth()">S'authentifier</button>
        <p id="error-msg" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;">Code incorrect.</p>
    </div>
</div>

<div id="admin-content" style="display: flex;">
    <aside>
        <div class="logo">FIXHAITI ADMIN</div>
        <nav>
            <div class="active">📥 File d'attente</div>
            <div>📍 Gestion de Carte</div>
            <div>📈 Rapports Mensuels</div>
        </nav>
    </aside>

    <main>
        <div class="header">
            <h1>Validation des Expertises</h1>
            <div style="color: #64748b;">Administrateur: <strong>Seb</strong></div>
        </div>

        <table class="queue-table">
            <thead>
                <tr>
                    <th>Infrastructure</th>
                    <th>Signalements</th>
                    <th>Zone</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><strong>Route / Pavement</strong></td>
                    <td><span style="color: var(--accent); font-weight: 700;">18 Citizens</span></td>
                    <td>Pétion-Ville</td>
                    <td><button class="btn-verify" onclick="openEval('Pétion-Ville')">Évaluer</button></td>
                </tr>
            </tbody>
        </table>
    </main>
</div>

<div id="evalModal" class="modal">
    <div class="modal-content">
        <h2 id="evalLoc">Expertise Zone</h2>
        <label style="display:block; margin-top:15px; font-weight:600;">Estimation Budgétaire (USD)</label>
        <input type="number" id="final-cost" placeholder="ex: 5000" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        
        <label style="display:block; margin-top:10px; font-weight:600;">Note Technique</label>
        <textarea style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;" rows="3"></textarea>
        
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-verify" style="flex:1" onclick="finalize()">Publier l'Audit</button>
            <button style="border:none; background:none; color:#64748b;" onclick="closeModal()">Fermer</button>
        </div>
    </div>
</div>

<script>
    // 1. SIMPLE AUTHENTICATION
    function checkAuth() {
        const pass = document.getElementById('admin-pass').value;
        // You can change 'Haiti2026' to whatever password you want
        if (pass === 'Haiti2026') {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'flex';
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    // 2. WORKFLOW LOGIC
    function openEval(loc) {
        document.getElementById('evalLoc').innerText = "Expertise: " + loc;
        document.getElementById('evalModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('evalModal').style.display = 'none'; }

    function finalize() {
        const val = document.getElementById('final-cost').value;
        alert("Rapport validé. L'estimation de $" + val + " est maintenant publique.");
        closeModal();
    }
</script>

</body>
</html>
